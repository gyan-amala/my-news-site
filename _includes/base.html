<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default("Gyan Amala | Independent Journalism") }}</title>
    
    <link rel="icon" type="image/png" href="/logo-icon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-inner" style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1300px; margin: 0 auto;">
            
            <a href="/" style="display: flex; align-items: center; gap: 20px; text-decoration: none;">
                <img src="/logo-icon.png" alt="Gyan Amala Logo" class="header-logo">
                <h1 class="logo" style="margin: 0;">GYAN AMALA</h1>
            </a>

            <nav class="main-nav" style="display: flex; gap: 25px; align-items: center;">
                <a href="/" style="font-weight: 700; color: var(--text-dark); text-decoration: none; font-size: 1.1rem;">News Feed</a>
                <a href="/psir/" style="font-weight: 800; color: var(--color-polity); text-decoration: none; font-size: 1.1rem; background: #eff6ff; padding: 8px 16px; border-radius: 8px;">PSIR Hub</a>
            </nav>

        </div>
    </header>

    {{ content | safe }}

    <footer>
        <p>© 2026 Gyan Amala. Independent Journalism.</p>
    </footer>

</body>
</html>
