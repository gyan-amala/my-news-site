<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default("Gyan Amala | Independent Journalism") }}</title>
    
    <link rel="icon" type="image/png" href="/logo-icon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-inner">
            
            <a href="/" class="brand-link" aria-label="Gyan Amala Homepage">
                <img src="/logo-icon.png" alt="Gyan Amala Logo" class="header-logo">
                <h1 class="logo">GYAN AMALA</h1>
            </a>

            <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
            <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle Navigation Menu">
                <span></span>
            </label>

            <nav class="main-nav" aria-label="Main Navigation">
                <a href="/" class="nav-link {% if page.url == '/' %}active-nav{% endif %}">News Feed</a>
                <a href="/psir/" class="nav-link {% if '/psir/' in page.url %}active-nav{% endif %}">PSIR</a>
                <a href="/gs/" class="nav-link {% if '/gs/' in page.url %}active-nav{% endif %}">GS</a>
                <a href="/essay/" class="nav-link {% if '/essay/' in page.url %}active-nav{% endif %}">Essay</a>
                 </nav>

        </div>
    </header>

    <main id="main-content">
        {{ content | safe }}
    </main>

    <footer class="main-footer">
        <div class="footer-inner">
            <nav class="footer-nav" aria-label="Secondary Policies Navigation">
                <a href="/about/">About Us</a>
                <a href="/contact/">Contact Us</a>
                <a href="/editorial-policy/">Editorial Policy</a>
                <a href="/privacy-policy/">Privacy Policy</a>
            </nav>
            <p class="copyright">© {{ site.currentYear }} Gyan Amala. Independent Journalism.</p>
        </div>
    </footer>

</body>
</html>
