---
permalink: /archives/history/
layout: index.html
---
<div class="wrapper" style="margin-top: 40px;">
    <div class="section-heading">
        <div class="heading-dot" style="background: var(--color-history);"></div>
        <h2>Echoes of Time (On This Day Archive)</h2>
    </div>
    <div style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 50px;">
        {% for brief in collections.daily | reverse %}
        <div style="background: var(--card-bg); padding: 30px; border-radius: var(--radius); box-shadow: var(--shadow-soft); border-left: 5px solid var(--color-history);">
            <h3 style="color: var(--color-history); margin-bottom: 5px;">Year {{ brief.data.historyYear }}</h3>
            <p style="font-size: 1.05rem;">{{ brief.data.historyEvent }}</p>
            <small style="color: var(--text-muted); display:block; margin-top: 10px;">Logged on: {{ brief.data.date }}</small>
        </div>
        {% endfor %}
    </div>
</div>
